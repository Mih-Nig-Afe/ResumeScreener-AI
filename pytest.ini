[pytest]
# Pytest configuration for ResumeScreener-AI

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.8

# Command line options applied by default
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Enable strict markers (all markers must be registered)
    --strict-markers
    # Show warnings
    -W default
    # Coverage options
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-config=.coveragerc
    # Fail if coverage is below threshold
    --cov-fail-under=85

# Markers for categorizing tests
markers =
    unit: Unit tests for individual functions and classes
    integration: Integration tests for end-to-end workflows
    slow: Tests that take significant time to run
    property: Property-based tests using hypothesis
    smoke: Quick smoke tests for basic functionality

# Console output style
console_output_style = progress

# Logging configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Test collection
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv
    env
    .env
    htmlcov
    .pytest_cache

# Doctest configuration
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Timeout for tests (in seconds)
# Requires pytest-timeout plugin
# timeout = 300

# Parallel execution
# Requires pytest-xdist plugin
# Use with: pytest -n auto
# addopts = -n auto

# Fail on first error (useful for debugging)
# Uncomment to enable
# addopts = -x

# Show captured output for failed tests
# addopts = --capture=no
